* { box-sizing: border-box; margin: 0; padding: 0; }
:root {

  --verde: #16a34a; --verde-claro: #dcfce7;

body { font-family: "Segoe UI", Arial, sans-serif; background: var(--gris); color: var(--texto); font-size: 14px; }
header { background: var(--azul); color: white; padding: 14px 24px; display: flex; align-items: center; gap: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
.logo { font-size: 20px; font-weight: 800; }
.header-info h1 { font-size: 15px; font-weight: 700; }
.header-info p { font-size: 11px; opacity: 0.75; margin-top: 2px; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.pulse { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.refresh-info { font-size: 11px; opacity: 0.75; }
.btn-refresh { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; color: #fff; padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; }
.main-tabs { display: flex; background: white; border-bottom: 2px solid var(--border); padding: 0 24px; }
.main-tab { padding: 14px 24px; font-size: 14px; font-weight: 700; color: var(--suave); cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; border: none; background: none; font-family: inherit; transition: all 0.15s; }
.main-tab:hover { color: var(--azul); }
.main-tab.active { color: var(--azul); border-bottom: 3px solid var(--azul); }
.main-tab.tab-m.active { color: var(--indigo); border-bottom: 3px solid var(--indigo); }
.panel { display: none; }
.panel.active { display: block; }
.stats-bar { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; padding: 16px 24px; }
.stats-bar5 { display: grid; grid-template-columns: repeat(5,1fr); gap: 12px; padding: 16px 24px; }
.stat { background: white; border-radius: 10px; padding: 14px 16px; border-left: 4px solid #ccc; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.stat.s-total { border-color: var(--azul); }
.stat.s-cobrado { border-color: var(--verde); }
.stat.s-pendiente { border-color: var(--naranja); }
.stat.s-vencido { border-color: var(--rojo); }
.stat.s-neto { border-color: var(--indigo); }
.stat-label { font-size: 10px; color: var(--suave); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-value { font-size: 18px; font-weight: 800; margin-top: 4px; }
.s-cobrado .stat-value { color: var(--verde); }
.s-vencido .stat-value { color: var(--rojo); }
.s-pendiente .stat-value { color: var(--naranja); }
.s-neto .stat-value { color: var(--indigo); }
.stat-count { font-size: 11px; color: #aaa; margin-top: 2px; }
.month-bar { display: flex; gap: 8px; padding: 0 24px 12px; overflow-x: auto; scrollbar-width: thin; }
.month-tab { padding: 5px 16px; border-radius: 20px; border: 1.5px solid var(--border); background: white; cursor: pointer; font-size: 12px; font-weight: 700; color: var(--suave); white-space: nowrap; display: flex; align-items: center; gap: 6px; font-family: inherit; }
.month-tab.active { background: var(--azul); color: white; border-color: var(--azul); }
.mtab-c { font-size: 10px; background: rgba(0,0,0,0.1); padding: 1px 6px; border-radius: 10px; }
.month-tab.active .mtab-c { background: rgba(255,255,255,0.25); }
.toolbar { display: flex; align-items: center; gap: 8px; padding: 0 24px 14px; flex-wrap: wrap; }
.filter-btn { padding: 6px 16px; border-radius: 20px; border: 1.5px solid var(--border); background: white; cursor: pointer; font-size: 12px; font-weight: 600; color: var(--suave); font-family: inherit; transition: all 0.15s; }
.filter-btn.active { background: var(--azul); color: white; border-color: var(--azul); }
.btn-nuevo { margin-left: auto; padding: 8px 18px; background: var(--azul); color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
.table-wrap { padding: 0 24px 24px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); min-width: 900px; }
thead tr { background: var(--celeste); }
th { padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 700; color: var(--azul); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f8fafc; }
tfoot td { background: var(--azul); color: white; font-weight: 700; padding: 10px 12px; }
.empty-row td { text-align: center; padding: 40px; color: var(--suave); font-style: italic; }
.comp { font-weight: 700; font-size: 12px; background: var(--celeste); padding: 2px 8px; border-radius: 4px; color: var(--azul); }
.comp-m { background: #e8edf7; color: var(--indigo); }
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.b-pagado { background: var(--verde-claro); color: var(--verde); }
.b-pendiente { background: #fef9c3; color: #854d0e; }
.b-vencido { background: var(--rojo-claro); color: var(--rojo); }
.b-proximo { background: var(--naranja-claro); color: #92400e; }
.dias-ok { color: var(--suave); font-size: 12px; }
.dias-warn { color: var(--naranja); font-weight: 600; font-size: 12px; }
.dias-bad { color: var(--rojo); font-weight: 700; font-size: 12px; }

.obs-input { width: 110px; }
.pay-btn { padding: 4px 10px; border-radius: 6px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; margin-right: 3px; }
.btn-cobrar { background: var(--verde-claro); color: var(--verde); }
.btn-anular { background: #fee2e2; color: var(--rojo); }
.btn-del { background: #f1f5f9; color: var(--suave); }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: white; border-radius: 14px; padding: 24px; width: 100%; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-height: 90vh; overflow-y: auto; }
.modal h2 { font-size: 16px; font-weight: 700; color: var(--azul); margin-bottom: 16px; }
.mfield { margin-bottom: 12px; }
.mfield label { display: block; font-size: 11px; font-weight: 700; color: var(--suave); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
.mfield input { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: 9px 12px; font-size: 14px; font-family: inherit; color: var(--texto); outline: none; }
.mfield input:focus { border-color: var(--azul); }
.mfield input[readonly] { background: #f8fafc; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
.btn-cancel { padding: 9px 18px; border: 1.5px solid var(--border); border-radius: 8px; background: white; color: var(--suave); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-save { padding: 9px 18px; border: none; border-radius: 8px; background: var(--azul); color: white; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
.spinner-wrap { text-align: center; padding: 60px; color: var(--suave); }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--azul); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }

@media(max-width:700px) {

</div>

<div class="panel active" id="panelT">
  <div class="stats-bar">
    <div class="stat s-total"><div class="stat-label">Total facturado</div><div class="stat-value" id="tTotal">—</div><div class="stat-count" id="tTotalC">—</div></div>

    <button class="btn-nuevo" onclick="abrirT()">+ Nueva factura C</button>

    <button class="filter-btn" onclick="setFM('vencido',this)">Vencido</button>
    <button class="filter-btn" onclick="setFM('pagado',this)">Cobrado</button>

</div>

<!-- MODAL TANIA -->
<div class="modal-overlay" id="modalT">

    <div class="mfield"><label>Observaciones</label><input type="text" id="tOb" placeholder="Opcional"></div>
    <div class="modal-btns">

    </div>
  </div>
</div>

let cT=[], cM=[], fT='todos', fM='todos', mT='todos', mM='todos';

const fmt = n => new Intl.NumberFormat("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0}).format(Number(n));
const today = () => new Date().toISOString().split("T")[0];

// Usar GET con parámetros para evitar CORS
async function apiGet(params) {
  const url = URL_AS + "?" + new URLSearchParams(params).toString();
  const r = await fetch(url);
  return r.json();
}

async function apiPost(params) {
  // Enviar como GET con todos los parámetros para evitar CORS
  const url = URL_AS + "?" + new URLSearchParams(params).toString();
  await fetch(url, {mode:"no-cors"});
}

function isPag(c) { return c.pagado===true||c.pagado==="TRUE"||c.pagado==="true"; }
function getStatus(c) {
  if(isPag(c)) return 'pagado';
  const v=new Date((c.vencimiento||"")+"T00:00:00"), h=new Date(); h.setHours(0,0,0,0);
  const d=Math.ceil((v-h)/86400000);
  return d<0?'vencido':d<=5?'proximo':'pendiente';
}
function diasLabel(c) {
  const st=getStatus(c);
  if(st==='pagado') return {text:'—',cls:'dias-ok'};
  const v=new Date((c.vencimiento||"")+"T00:00:00"),h=new Date();h.setHours(0,0,0,0);
  const d=Math.ceil((v-h)/86400000);
  if(d<0) return {text:'Vencido '+Math.abs(d)+'d',cls:'dias-bad'};
  if(d===0) return {text:'Vence hoy',cls:'dias-warn'};
  if(d<=5) return {text:'Vence en '+d+'d',cls:'dias-warn'};
  return {text:d+' días',cls:'dias-ok'};
}

function switchTab(tab) {
  document.getElementById('panelT').classList.toggle('active',tab==='t');
  document.getElementById('panelM').classList.toggle('active',tab==='m');
  document.getElementById('tabT').classList.toggle('active',tab==='t');
  document.getElementById('tabM').classList.toggle('active',tab==='m');
}

async function cargarTodo() {
  document.getElementById('ultimaAct').textContent='Actualizando...';
  await Promise.all([cargarT(),cargarM()]);
  document.getElementById('ultimaAct').textContent='Actualizado '+new Date().toLocaleTimeString("es-AR");
}

async function cargarT() {
  try {
    const d = await apiGet({action:'getTania'});
    if(d.ok&&d.cobros&&d.cobros.length>0) {
      cT=d.cobros.map(c=>({...c,importe:Number(c.importe),pagado:isPag(c)}));
    } else { cT=JSON.parse(JSON.stringify(defaultTania)); await migrarT(); }
  } catch(e) { cT=JSON.parse(JSON.stringify(defaultTania)); }
  renderT();
}

async function cargarM() {
  try {
    const d = await apiGet({action:'getMatias'});
    if(d.ok&&d.cobros&&d.cobros.length>0) {
      cM=d.cobros.map(c=>({...c,neto:Number(c.neto),iva:Number(c.iva),total:Number(c.total),pagado:isPag(c)}));
    } else { cM=JSON.parse(JSON.stringify(defaultMatias)); await migrarM(); }
  } catch(e) { cM=JSON.parse(JSON.stringify(defaultMatias)); }
  renderM();
}

async function migrarT() {
  for(const c of defaultTania) {
    await apiPost({action:'addTania',comp:c.comp,cliente:c.cliente,emision:c.emision,vencimiento:c.vencimiento,importe:c.importe,obs:c.obs||'',contrato:''});
    await new Promise(r=>setTimeout(r,300));
  }
}
async function migrarM() {
  for(const c of defaultMatias) {
    await apiPost({action:'addMatias',comp:c.comp,cliente:c.cliente,emision:c.emision,vencimiento:c.vencimiento,neto:c.neto,iva:c.iva,total:c.total,obs:c.obs||'',contrato:''});
    await new Promise(r=>setTimeout(r,300));
  }
}

function renderMonths(elId,cobros,mesAct,onSel) {
  const meses=[...new Set(cobros.map(c=>{const d=(c.emision||'').toString();return d.length>=7?d.substring(0,7):null;}).filter(Boolean))].sort().reverse();
  const bar=document.getElementById(elId); bar.innerHTML='';
  const b=document.createElement('button');
  b.className='month-tab'+(mesAct==='todos'?' active':'');
  b.innerHTML='Todos <span class="mtab-c">'+cobros.length+'</span>';
  b.onclick=()=>onSel('todos'); bar.appendChild(b);
  meses.forEach(m=>{
    const [y,mo]=m.split('-');
    const cnt=cobros.filter(c=>(c.emision||'').toString().startsWith(m)).length;
    const btn=document.createElement('button');
    btn.className='month-tab'+(mesAct===m?' active':'');
    btn.innerHTML=MESES[parseInt(mo)-1]+' '+y+' <span class="mtab-c">'+cnt+'</span>';
    btn.onclick=()=>onSel(m); bar.appendChild(btn);
  });
}

function filtrar(cobros,mes,filtro) {
  const base=mes==='todos'?cobros:cobros.filter(c=>(c.emision||'').toString().startsWith(mes));
  return base.filter(c=>{
    const st=getStatus(c);
    if(filtro==='todos') return true;
    if(filtro==='pagado') return st==='pagado';
    if(filtro==='vencido') return st==='vencido'||st==='proximo';
    if(filtro==='pendiente') return st==='pendiente'||st==='proximo';
    return true;
  });
}

function renderT() {
  const base=mT==='todos'?cT:cT.filter(c=>(c.emision||'').toString().startsWith(mT));
  const total=base.reduce((s,c)=>s+Number(c.importe),0);
  const cobrados=base.filter(c=>getStatus(c)==='pagado');
  const cobrado=cobrados.reduce((s,c)=>s+Number(c.importe),0);
  const vencidos=base.filter(c=>getStatus(c)==='vencido');
  const pend=base.filter(c=>getStatus(c)!=='pagado');
  document.getElementById('tTotal').textContent=fmt(total);
  document.getElementById('tTotalC').textContent=base.length+' factura'+(base.length!==1?'s':'');
  document.getElementById('tCobrado').textContent=fmt(cobrado);
  document.getElementById('tCobradoC').textContent=cobrados.length+' cobrada'+(cobrados.length!==1?'s':'');
  document.getElementById('tPend').textContent=fmt(pend.reduce((s,c)=>s+Number(c.importe),0));
  document.getElementById('tPendC').textContent=pend.length+' pendiente'+(pend.length!==1?'s':'');
  document.getElementById('tVenc').textContent=fmt(vencidos.reduce((s,c)=>s+Number(c.importe),0));
  document.getElementById('tVencC').textContent=vencidos.length+' vencida'+(vencidos.length!==1?'s':'');
  renderMonths('tMonthBar',cT,mT,m=>{mT=m;renderT();});
  const visible=filtrar(cT,mT,fT);
  const bm={pagado:'b-pagado',vencido:'b-vencido',pendiente:'b-pendiente',proximo:'b-proximo'};
  const lm={pagado:'Cobrado',vencido:'Vencido',pendiente:'Pendiente',proximo:'Por vencer'};
  const rows=visible.length===0?'<tr class="empty-row"><td colspan="11">No hay facturas</td></tr>':visible.map(c=>{
    const st=getStatus(c),dias=diasLabel(c);
    const fe=(c.emision||'').toString().split('-').reverse().join('/');
    const fp=(c.fechaPago||'').toString().split('-').reverse().join('/');
    return '<tr><td><span class="comp">'+( c.comp||'')+'</span></td><td style="font-weight:500;max-width:160px">'+(c.cliente||'')+'</td><td style="font-size:11px;color:#64748b">'+(c.contrato||'—')+'</td><td style="font-size:12px;white-space:nowrap">'+fe+'</td><td><input type="date" class="venc-input" value="'+(c.vencimiento||'')+'" onchange="updT(\''+c.id+'\',\'vencimiento\',this.value)"></td><td style="font-weight:700;font-size:14px">'+fmt(c.importe)+'</td><td><span class="badge '+bm[st]+'">'+lm[st]+'</span></td><td class="'+dias.cls+'">'+dias.text+'</td><td>'+(st==='pagado'?'<span style="font-size:12px;color:var(--verde);font-weight:600">'+fp+'</span>':'<input type="date" id="tfp_'+c.id+'" max="'+today()+'">')+'</td><td><input type="text" class="obs-input" value="'+(c.obs||'')+'" placeholder="—" onchange="updT(\''+c.id+'\',\'obs\',this.value)"></td><td style="white-space:nowrap">'+(st==='pagado'?'<button class="pay-btn btn-anular" onclick="anularT(\''+c.id+'\')">&#8629;</button>':'<button class="pay-btn btn-cobrar" onclick="cobrarT(\''+c.id+'\')">&check; Cobrado</button>')+' <button class="pay-btn btn-del" onclick="borrarT(\''+c.id+'\')">&#128465;</button></td></tr>';
  }).join('');
  document.getElementById('tTabla').innerHTML='<table><thead><tr><th>Comprobante</th><th>Cliente</th><th>Contrato</th><th>Emision</th><th>Vencimiento</th><th>Importe</th><th>Estado</th><th>Dias</th><th>Fecha cobro</th><th>Obs.</th><th>Acciones</th></tr></thead><tbody>'+rows+'</tbody><tfoot><tr><td colspan="5">Total ('+visible.length+' facturas)</td><td>'+fmt(visible.reduce((s,c)=>s+Number(c.importe),0))+'</td><td colspan="5"></td></tr></tfoot></table>';
}

    const fe=(c.emision||'').toString().split('-').reverse().join('/');
    const fp=(c.fechaPago||'').toString().split('-').reverse().join('/');
    return '<tr><td><span class="comp comp-m">'+(c.comp||'')+'</span></td><td style="font-weight:500;max-width:150px">'+(c.cliente||'')+'</td><td style="font-size:11px;color:#64748b">'+(c.contrato||'—')+'</td><td style="font-size:12px;white-space:nowrap">'+fe+'</td><td><input type="date" class="venc-input" value="'+(c.vencimiento||'')+'" onchange="updM(\''+c.id+'\',\'vencimiento\',this.value)"></td><td style="font-size:12px;color:var(--suave)">'+fmt(c.neto)+'</td><td style="font-size:12px;color:var(--indigo)">'+fmt(c.iva)+'</td><td style="font-weight:700;font-size:14px">'+fmt(c.total)+'</td><td><span class="badge '+bm[st]+'">'+lm[st]+'</span></td><td class="'+dias.cls+'">'+dias.text+'</td><td>'+(st==='pagado'?'<span style="font-size:12px;color:var(--verde);font-weight:600">'+fp+'</span>':'<input type="date" id="mfp_'+c.id+'" max="'+today()+'">')+'</td><td><input type="text" class="obs-input" value="'+(c.obs||'')+'" placeholder="—" onchange="updM(\''+c.id+'\',\'obs\',this.value)"></td><td style="white-space:nowrap">'+(st==='pagado'?'<button class="pay-btn btn-anular" onclick="anularM(\''+c.id+'\')">&#8629;</button>':'<button class="pay-btn btn-cobrar" onclick="cobrarM(\''+c.id+'\')">&check; Cobrado</button>')+' <button class="pay-btn btn-del" onclick="borrarM(\''+c.id+'\')">&#128465;</button></td></tr>';
  }).join('');
  document.getElementById('mTabla').innerHTML='<table><thead><tr><th>Comprobante</th><th>Cliente</th><th>Contrato</th><th>Emision</th><th>Vencimiento</th><th>Neto</th><th>IVA</th><th>Total</th><th>Estado</th><th>Dias</th><th>Fecha cobro</th><th>Obs.</th><th>Acciones</th></tr></thead><tbody>'+rows+'</tbody><tfoot><tr><td colspan="7">Total c/IVA ('+visible.length+' facturas)</td><td>'+fmt(visible.reduce((s,c)=>s+Number(c.total),0))+'</td><td colspan="5"></td></tr></tfoot></table>';
}

function setFT(f,btn) { fT=f; document.querySelectorAll('#panelT .filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderT(); }
function setFM(f,btn) { fM=f; document.querySelectorAll('#panelM .filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderM(); }

async function cobrarT(id) {
  const fp=document.getElementById('tfp_'+id);
  const fecha=fp?fp.value:today();
  if(!fecha){alert('Selecciona la fecha de cobro.');return;}
  const c=cT.find(x=>String(x.id)===String(id));
  if(c){c.pagado=true;c.fechaPago=fecha;}
  await apiPost({action:'updateTania',id:String(id),field:'pagado',value:'true',fechaPago:fecha});
  renderT();
}
async function anularT(id) {
  if(!confirm('Anular el cobro?'))return;
  const c=cT.find(x=>String(x.id)===String(id));
  if(c){c.pagado=false;c.fechaPago='';}
  await apiPost({action:'updateTania',id:String(id),field:'pagado',value:'false',fechaPago:''});
  renderT();
}
async function updT(id,field,value) {
  const c=cT.find(x=>String(x.id)===String(id)); if(c)c[field]=value;
  await apiPost({action:'updateTania',id:String(id),field:field,value:value});
  if(field!=='obs')renderT();
}
async function borrarT(id) {
  if(!confirm('Eliminar esta factura?'))return;
  cT=cT.filter(x=>String(x.id)!==String(id));
  await apiPost({action:'deleteTania',id:String(id)});
  renderT();
}

function abrirT() {
  ['tCmp','tCli','tCon','tImp','tOb'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('tEmi').value=today();
  document.getElementById('tVen').value='';
  document.getElementById('modalT').classList.add('show');
}
function abrirM() {
  ['mCmp','mCli','mCon','mNet','mIva','mTot','mOb'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('mEmi').value=today();
  document.getElementById('mVen').value='';
  document.getElementById('modalM').classList.add('show');
}
function cerrarModales() {
  document.getElementById('modalT').classList.remove('show');
  document.getElementById('modalM').classList.remove('show');
}
function calcIVA() {
  const n=parseFloat(document.getElementById('mNet').value)||0;
  const iva=Math.round(n*0.21);
  document.getElementById('mIva').value=iva;
  document.getElementById('mTot').value=n+iva;
}

async function guardarT() {
  const comp=document.getElementById('tCmp').value.trim();
  const cliente=document.getElementById('tCli').value.trim();
  const emision=document.getElementById('tEmi').value;
  const vencimiento=document.getElementById('tVen').value;
  const importe=document.getElementById('tImp').value;
  if(!comp||!cliente||!emision||!vencimiento||!importe){alert('Completa todos los campos obligatorios.');return;}
  const id=Date.now().toString();
  const nuevo={id,comp,cliente,emision,vencimiento,importe:Number(importe),pagado:false,fechaPago:'',obs:document.getElementById('tOb').value,contrato:document.getElementById('tCon').value};
  cT.push(nuevo);
  cerrarModales(); renderT();
  await apiPost({action:'addTania',comp,cliente,emision,vencimiento,importe:Number(importe),obs:nuevo.obs,contrato:nuevo.contrato});
  setTimeout(cargarT, 2000);
}

async function guardarM() {
  const comp=document.getElementById('mCmp').value.trim();
  const cliente=document.getElementById('mCli').value.trim();
  const emision=document.getElementById('mEmi').value;
  const vencimiento=document.getElementById('mVen').value;
  const neto=parseFloat(document.getElementById('mNet').value)||0;
  if(!comp||!cliente||!emision||!vencimiento||!neto){alert('Completa todos los campos obligatorios.');return;}
  const iva=Math.round(neto*0.21);
  const total=neto+iva;
  const id=Date.now().toString();
  const nuevo={id,comp,cliente,emision,vencimiento,neto,iva,total,pagado:false,fechaPago:'',obs:document.getElementById('mOb').value,contrato:document.getElementById('mCon').value};
  cM.push(nuevo);
  cerrarModales(); renderM();
  await apiPost({action:'addMatias',comp,cliente,emision,vencimiento,neto,iva,total,obs:nuevo.obs,contrato:nuevo.contrato});
  setTimeout(cargarM, 2000);
}

['modalT','modalM'].forEach(id=>{
  document.getElementById(id).addEventListener('click',e=>{if(e.target===e.currentTarget)cerrarModales();});
});

cargarTodo();
setInterval(cargarTodo,30000);
